<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 플래너</title>
    
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        /* 🎨 CSS 변수 설정 */
        :root {
            --bg-body: #f3f4f6;
            --bg-surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --border: #e5e7eb;
            --radius-md: 8px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; }
        body { font-family: var(--font-family); margin: 0; padding: 0; background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        header { background-color: var(--bg-surface); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10; flex-wrap: wrap; gap: 10px; }
        header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .action-btn, .reset-btn { padding: 6px 12px; border-radius: var(--radius-md); cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: all 0.2s; white-space: nowrap; }
        .action-btn { background-color: white; color: var(--text-main); border: 1px solid var(--border); }
        .reset-btn { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); }

        /* 📱 반응형 메인 레이아웃 */
        .main-container { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; }

        /* 모바일용 탭 버튼 (데스크톱에서는 숨김) */
        .mobile-tabs { display: none; background: white; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 600; color: var(--text-muted); cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .left-panel { background: var(--bg-surface); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; z-index: 5; }
        .right-panel { padding: 16px; overflow-x: auto; overflow-y: auto; background-color: var(--bg-body); }
        
        .timetable-wrapper { display: flex; gap: 16px; min-width: max-content; padding-bottom: 10px; }
        .day-column { background: var(--bg-surface); width: 280px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); flex-shrink: 0; border: 1px solid var(--border); display: flex; flex-direction: column; margin-bottom: 20px; }
        .day-header { padding: 16px; font-weight: 700; text-align: center; border-bottom: 1px solid var(--border); }

        /* 모달 스타일 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 24px; border-radius: var(--radius-lg); width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); }

        .radio-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .radio-label input { display: none; }
        .radio-label span { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 0.8rem; cursor: pointer; display: inline-block; background: white; }
        .radio-label input:checked + span { background: #eff6ff; border-color: var(--primary); color: var(--primary); }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: var(--radius-md); width: 100%; cursor: pointer; font-weight: 600; }

        /* 타임 슬롯 및 아이템 */
        .time-slot { height: 72px; border-bottom: 1px solid #edf2f7; position: relative; padding-left: 60px; }
        .time-label { position: absolute; left: 10px; top: 10px; font-size: 0.75rem; color: var(--text-muted); }
        .activity-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px; box-shadow: var(--shadow-sm); cursor: grab; position: relative; }
        .time-slot .activity-item { position: absolute; left: 60px; right: 10px; z-index: 10; }
        
        .activity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .activity-title { font-weight: 600; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-group { display: flex; gap: 5px; }
        .icon-btn { cursor: pointer; font-size: 0.7rem; opacity: 0.7; }
        .resizer { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; cursor: ns-resize; }

        /* 배정 대기열 */
        #unassigned-list { margin-top: 20px; padding: 15px; border: 2px dashed var(--border); border-radius: var(--radius-md); min-height: 150px; }
        #unassigned-list .activity-item { margin-bottom: 8px; }

        /* 📱 모바일 미디어 쿼리 */
        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            header h1 { font-size: 1rem; width: 100%; text-align: center; }
            .header-actions { width: 100%; justify-content: center; }
            .mobile-tabs { display: flex; }
            .left-panel.hidden, .right-panel.hidden { display: none; }
            .left-panel { border-right: none; height: 100%; }
            .timetable-wrapper { min-width: unset; width: 100%; flex-direction: column; }
            .day-column { width: 100%; }
            .time-slot { padding-left: 50px; }
            .time-label { left: 5px; }
        }

        /* 일정 타입별 색상 */
        .type-meal { border-left: 4px solid #f59e0b; }
        .type-cafe { border-left: 4px solid #8b5cf6; }
        .type-activity { border-left: 4px solid #10b981; }
        .type-transport { border-left: 4px solid #3b82f6; }
        .type-accommodation { border-left: 4px solid #ef4444; }
        .type-todo { border-left: 4px solid #6b7280; }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">✈️ 나의 여행 플래너</h1>
        <div class="header-actions">
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
            <button class="action-btn" onclick="document.getElementById('importFile').click()">📂 불러오기</button>
            <button class="action-btn" onclick="openExportModal()">📤 내보내기</button>
            <button class="reset-btn" onclick="resetPlanner()">🔄 리셋</button>
        </div>
    </header>

    <div class="mobile-tabs">
        <button class="tab-btn active" id="tab-input-btn" onclick="switchTab('input')">일정 만들기</button>
        <button class="tab-btn" id="tab-view-btn" onclick="switchTab('view')">타임테이블</button>
    </div>

    <div class="main-container">
        <div class="left-panel" id="panel-input">
            <h3>새로운 일정 만들기</h3>
            <div class="form-group">
                <label>분류</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="actType" value="meal" checked><span>식사 🍔</span></label>
                    <label class="radio-label"><input type="radio" name="actType" value="cafe"><span>카페 ☕</span></label>
                    <label class="radio-label"><input type="radio" name="actType" value="activity"><span>액티비티 🎢</span></label>
                    <label class="radio-label"><input type="radio" name="actType" value="transport"><span>이동 🚌</span></label>
                    <label class="radio-label"><input type="radio" name="actType" value="accommodation"><span>숙소 🛌</span></label>
                    <label class="radio-label"><input type="radio" name="actType" value="todo"><span>할일 📝</span></label>
                </div>
            </div>
            <div class="form-group"><input type="text" id="actTitle" placeholder="일정 이름 (예: 커피 타임)"></div>
            <div class="form-group"><input type="text" id="actMapName" placeholder="장소 이름 (선택)"></div>
            <div class="form-group"><input type="text" id="actUrl" placeholder="구글 지도 URL (선택)"></div>
            <button class="primary-btn" onclick="addActivity()">일정 생성</button>

            <div id="unassigned-list" ondrop="drop(event)" ondragover="allowDrop(event)">
                <h4 style="margin:0 0 10px 0; font-size: 0.8rem; color: var(--text-muted);">배치 대기열 (드래그하여 이동)</h4>
            </div>
        </div>

        <div class="right-panel hidden" id="panel-view">
            <div id="timetable" class="timetable-wrapper"></div>
        </div>
    </div>

    <div id="tripModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 style="margin-top:0; text-align:center;">여행 정보 입력</h2>
            <div class="form-group"><label>여행지</label><input type="text" id="tripDest" placeholder="예: 제주도"></div>
            <div class="form-group"><label>시작일</label><input type="date" id="tripStart"></div>
            <div class="form-group"><label>종료일</label><input type="date" id="tripEnd"></div>
            <button class="primary-btn" onclick="startTrip()">플래너 시작</button>
        </div>
    </div>

    <div id="exportModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="text-align: center;">
            <h3>내보내기</h3>
            <button class="primary-btn" style="margin-bottom:10px; background:#4f46e5;" onclick="exportJson()">JSON 파일 저장</button>
            <button class="primary-btn" style="margin-bottom:10px; background:#10b981;" onclick="exportImage()">이미지로 저장</button>
            <button class="action-btn" style="width:100%" onclick="closeExportModal()">닫기</button>
        </div>
    </div>

    <script>
        let tripInfo = null;
        let activities = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            if (!tripInfo) {
                document.getElementById('tripModal').style.display = 'flex';
            } else {
                initPlanner();
            }
            // 데스크톱 환경에서는 두 패널 모두 보이게 처리
            if (window.innerWidth > 768) {
                document.getElementById('panel-view').classList.remove('hidden');
            }
        });

        function switchTab(tab) {
            const inputPanel = document.getElementById('panel-input');
            const viewPanel = document.getElementById('panel-view');
            const inputBtn = document.getElementById('tab-input-btn');
            const viewBtn = document.getElementById('tab-view-btn');

            if (tab === 'input') {
                inputPanel.classList.remove('hidden');
                viewPanel.classList.add('hidden');
                inputBtn.classList.add('active');
                viewBtn.classList.remove('active');
            } else {
                inputPanel.classList.add('hidden');
                viewPanel.classList.remove('hidden');
                inputBtn.classList.remove('active');
                viewBtn.classList.add('active');
            }
        }

        function loadData() {
            tripInfo = JSON.parse(localStorage.getItem('tripInfo'));
            activities = JSON.parse(localStorage.getItem('activities')) || [];
        }

        function startTrip() {
            const dest = document.getElementById('tripDest').value;
            const start = document.getElementById('tripStart').value;
            const end = document.getElementById('tripEnd').value;
            if (!dest || !start || !end) return alert('정보를 입력해주세요.');
            tripInfo = { dest, start, end };
            localStorage.setItem('tripInfo', JSON.stringify(tripInfo));
            document.getElementById('tripModal').style.display = 'none';
            initPlanner();
        }

        function initPlanner() {
            document.getElementById('header-title').innerText = `✈️ ${tripInfo.dest} (${tripInfo.start} ~ ${tripInfo.end})`;
            renderTimetable();
            renderActivities();
        }

        function renderTimetable() {
            const container = document.getElementById('timetable');
            container.innerHTML = '';
            const dates = getDates(tripInfo.start, tripInfo.end);

            dates.forEach((date, i) => {
                const dayCol = document.createElement('div');
                dayCol.className = 'day-column';
                dayCol.innerHTML = `<div class="day-header">Day ${i+1} (${date})</div>`;
                
                for (let h = 6; h <= 24; h++) {
                    const slot = document.createElement('div');
                    slot.className = 'time-slot';
                    slot.dataset.date = date;
                    slot.dataset.hour = h;
                    slot.ondragover = allowDrop;
                    slot.ondrop = drop;
                    slot.innerHTML = `<span class="time-label">${h}:00</span>`;
                    dayCol.appendChild(slot);
                }
                container.appendChild(dayCol);
            });
        }

        function addActivity() {
            const title = document.getElementById('actTitle').value;
            if (!title) return alert('제목을 입력하세요.');
            const type = document.querySelector('input[name="actType"]:checked').value;
            
            const newAct = {
                id: 'act-' + Date.now(),
                title, type,
                mapName: document.getElementById('actMapName').value,
                url: document.getElementById('actUrl').value,
                assignedDate: null, assignedHour: null, height: 60
            };

            activities.push(newAct);
            save();
            renderActivities();
            
            document.getElementById('actTitle').value = '';
            // 모바일이면 자동으로 타임테이블 탭으로 이동
            if (window.innerWidth <= 768) switchTab('view');
        }

        function renderActivities() {
            document.querySelectorAll('.activity-item').forEach(el => el.remove());
            const unassigned = document.getElementById('unassigned-list');

            activities.forEach(act => {
                const el = createActivityEl(act);
                if (act.assignedDate && act.assignedHour) {
                    const slot = document.querySelector(`.time-slot[data-date="${act.assignedDate}"][data-hour="${act.assignedHour}"]`);
                    if (slot) slot.appendChild(el);
                    else unassigned.appendChild(el);
                } else {
                    unassigned.appendChild(el);
                }
            });
        }

        function createActivityEl(act) {
            const div = document.createElement('div');
            div.className = `activity-item type-${act.type}`;
            div.id = act.id;
            div.draggable = true;
            div.ondragstart = (e) => e.dataTransfer.setData('text', act.id);
            div.style.height = act.height + 'px';
            div.innerHTML = `
                <div class="activity-header">
                    <span class="activity-title">${act.title}</span>
                    <span class="icon-btn" onclick="deleteAct('${act.id}')">❌</span>
                </div>
                ${act.url ? `<a href="${act.url}" target="_blank" style="font-size:0.7rem; color:blue;">지도보기</a>` : ''}
            `;
            return div;
        }

        function deleteAct(id) {
            activities = activities.filter(a => a.id !== id);
            save(); renderActivities();
        }

        function allowDrop(e) { e.preventDefault(); }
        function drop(e) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const act = activities.find(a => a.id === id);
            const slot = e.currentTarget;

            if (slot.classList.contains('time-slot')) {
                act.assignedDate = slot.dataset.date;
                act.assignedHour = slot.dataset.hour;
            } else {
                act.assignedDate = null;
                act.assignedHour = null;
            }
            save(); renderActivities();
        }

        function save() { localStorage.setItem('activities', JSON.stringify(activities)); }
        
        function getDates(s, e) {
            const arr = []; let dt = new Date(s);
            while (dt <= new Date(e)) {
                arr.push(new Date(dt).toISOString().split('T')[0]);
                dt.setDate(dt.getDate() + 1);
            }
            return arr;
        }

        function resetPlanner() {
            if(confirm('초기화할까요?')) { localStorage.clear(); location.reload(); }
        }

        function openExportModal() { document.getElementById('exportModal').style.display = 'flex'; }
        function closeExportModal() { document.getElementById('exportModal').style.display = 'none'; }

        function exportJson() {
            const blob = new Blob([JSON.stringify({tripInfo, activities})], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'plan.json'; a.click();
        }

        function exportImage() {
            html2canvas(document.getElementById('timetable')).then(canvas => {
                const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = 'plan.png'; a.click();
            });
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                localStorage.setItem('tripInfo', JSON.stringify(data.tripInfo));
                localStorage.setItem('activities', JSON.stringify(data.activities));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
